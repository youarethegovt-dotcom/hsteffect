<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE Hannah Terry Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loader { border-top-color: #000; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .thinking-overlay { display: none; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-6 md:p-12 relative min-h-screen">

    <div id="overlay" class="thinking-overlay fixed inset-0 z-50 flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xs font-black uppercase tracking-[0.4em] text-black">AI Drafting in Progress...</h2>
        <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-widest text-center">Crunching Nashville Geometry<br>(Approx 20 Seconds)</p>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="border-b-8 border-black pb-8 mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-black tracking-tighter uppercase leading-none">Site Diagrammer</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase mt-4 italic">Nashville Firm Drafting Standard v5.1</p>
            </div>
            <div class="hidden md:block bg-black text-white px-4 py-2 text-[10px] font-black tracking-tighter">OFFICIAL FIRM TOOL</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="lg:col-span-1">
                <div class="bg-white border-2 border-slate-200 rounded-xl p-8 text-center h-full flex flex-col justify-center border-dashed hover:border-black transition-all">
                    <input type="file" id="imageInput" class="hidden" accept="image/*">
                    <label for="imageInput" class="cursor-pointer">
                        <div class="bg-black text-white px-6 py-4 font-black text-[10px] tracking-widest uppercase mb-4 inline-block shadow-lg">Load Site Photo</div>
                        <p id="fileName" class="text-slate-400 text-[10px] font-black uppercase truncate">Select Aerial</p>
                    </label>
                </div>
            </div>
            
            <div class="lg:col-span-2">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 px-1 italic">Style Override (Leave blank for Firm Standard)</label>
                <textarea id="styleInput" 
                          class="w-full h-32 p-4 bg-white border-2 border-slate-200 rounded-xl text-xs font-bold leading-relaxed focus:outline-none focus:border-black transition-all shadow-inner resize-none text-slate-600"
                          placeholder=".25mm dark charcoal outline around all buildings, .1mm thin gray lines for all of the building forms, roads to be a lighter gray tone, water represented with pale light blue, white masses for buildings with gray shade for the sides of the buildings in shadow..."></textarea>
            </div>
        </div>

        <button id="generateBtn" 
                class="w-full py-6 rounded-xl font-black text-lg tracking-[0.3em] transition-all bg-slate-200 text-slate-400 cursor-not-allowed uppercase shadow-md"
                disabled>
            Generate Site Diagram
        </button>

        <div id="resultContainer" class="mt-20 hidden">
            <div class="flex items-center justify-between mb-8 border-b-2 border-slate-200 pb-4">
                <h2 class="text-[10px] font-black uppercase tracking-[0.5em]">Nashville Master Output (3500px)</h2>
                <span class="bg-green-100 text-green-700 text-[9px] font-black px-3 py-1 rounded-full uppercase">Ready for Image Trace</span>
            </div>
            
            <img id="outputImage" class="w-full h-auto border-2 border-slate-100 shadow-2xl mb-12 rounded-sm grayscale hover:grayscale-0 transition-all duration-500">

            <a id="downloadPng" class="w-full flex items-center justify-center bg-black text-white py-6 font-black text-xs tracking-[0.4em] hover:bg-slate-800 transition-all cursor-pointer uppercase shadow-2xl rounded-xl">
                Download Master PNG
            </a>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput'), styleText = document.getElementById('styleInput'), btn = document.getElementById('generateBtn');
        const fileNameDisp = document.getElementById('fileName'), outputImg = document.getElementById('outputImage'), resultContainer = document.getElementById('resultContainer');
        const overlay = document.getElementById('overlay');

        let origW = 0, origH = 0;

        input.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image(); img.src = re.target.result;
                img.onload = () => {
                    origW = img.naturalWidth; origH = img.naturalHeight;
                    fileNameDisp.innerText = file.name.toUpperCase();
                    btn.disabled = false; btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                    btn.classList.add('bg-black', 'text-white', 'cursor-pointer');
                };
            };
            reader.readAsDataURL(file);
        };

        btn.onclick = async () => {
            overlay.style.display = 'flex';
            try {
                const reader = new FileReader();
                reader.readAsDataURL(input.files[0]);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const response = await fetch('/.netlify/functions/generate-diagram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imageBase64: base64, mimeType: input.files[0].type, customInstructions: styleText.value, width: origW, height: origH })
                    });

                    if (!response.ok) throw new Error("Processing Timeout - Try a smaller area.");
                    const data = await response.json();
                    
                    outputImg.src = `data:image/png;base64,${data.image}`;
                    const pngLink = document.getElementById('downloadPng');
                    pngLink.href = `data:image/png;base64,${data.image}`;
                    pngLink.download = `Nashville_Site_Plan_Standard.png`;

                    resultContainer.classList.remove('hidden');
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                    overlay.style.display = 'none';
                };
            } catch (err) {
                overlay.style.display = 'none';
                alert("ENGINE NOTICE: " + err.message);
            }
        };
    </script>
</body>
</html>
