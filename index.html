// ... (inside the <script> tag of your index.html)
btn.onclick = async () => {
    btn.innerText = "TALKING TO SERVER...";
    const file = input.files[0];
    const reader = new FileReader();
    
    reader.onload = async () => {
        try {
            const base64 = reader.result.split(',')[1];
            console.log("Sending to Netlify...");
            
            const res = await fetch('/.netlify/functions/generate-diagram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ imageBase64: base64, mimeType: file.type })
            });

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`Server Error: ${res.status} - ${errorText}`);
            }

            const data = await res.json();
            outputImg.src = `data:image/png;base64,${data.image}`;
            container.classList.remove('hidden');
            btn.innerText = "GENERATE DIAGRAM";
        } catch (err) {
            console.error(err);
            alert("FRONTEND ERROR: " + err.message);
            btn.innerText = "GENERATE DIAGRAM";
        }
    };
    reader.readAsDataURL(file);
};
