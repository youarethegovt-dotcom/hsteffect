<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hannah Terry Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Thinking Animation for the button */
        @keyframes pulse-thinking { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .btn-thinking { 
            animation: pulse-thinking 1.2s infinite; 
            background-color: #334155 !important; /* Slate-700 */
            cursor: wait !important;
            letter-spacing: 0.5em !important;
        }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <header class="border-b-8 border-black pb-8 mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-black tracking-tighter uppercase leading-none">Hannah Terry Effect</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase mt-4 italic">Nashville Digital Drafting Standard v5.3</p>
            </div>
            <div class="hidden md:block bg-black text-white px-4 py-2 text-[10px] font-black tracking-tighter uppercase">Firm Asset</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="lg:col-span-1">
                <div class="bg-white border-2 border-slate-200 rounded-xl p-8 text-center h-full flex flex-col justify-center border-dashed hover:border-black transition-all">
                    <input type="file" id="imageInput" class="hidden" accept="image/*">
                    <label for="imageInput" class="cursor-pointer">
                        <div class="bg-black text-white px-6 py-4 font-black text-[10px] tracking-widest uppercase mb-4 inline-block shadow-lg hover:bg-slate-800 transition">Upload Site Map</div>
                        <p id="fileName" class="text-slate-400 text-[10px] font-black uppercase truncate px-2">No file loaded</p>
                    </label>
                </div>
            </div>
            
            <div class="lg:col-span-2">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 px-1 italic">Style Specifications (Default: Firm Standard)</label>
                <textarea id="styleInput" 
                          class="w-full h-32 p-4 bg-white border-2 border-slate-200 rounded-xl text-xs font-bold leading-relaxed focus:outline-none focus:border-black transition-all shadow-inner resize-none text-slate-600"
                          placeholder=".25mm dark charcoal outline around all buildings, .1mm thin gray lines for all of the building forms, roads to be a lighter gray tone, water represented with pale light blue, white masses for buildings with gray shade for the sides of the buildings in shadow, not overly detailed, no text."></textarea>
            </div>
        </div>

        <button id="generateBtn" 
                class="w-full py-6 rounded-xl font-black text-lg tracking-[0.3em] transition-all bg-slate-200 text-slate-400 cursor-not-allowed uppercase shadow-md"
                disabled>
            Generate Site Diagram
        </button>

        <div id="resultContainer" class="mt-20 hidden">
            <div class="flex items-center justify-between mb-8 border-b-2 border-slate-200 pb-4">
                <h2 class="text-[10px] font-black uppercase tracking-[0.5em]">3500px Architectural Master</h2>
                <span class="bg-green-100 text-green-700 text-[9px] font-black px-3 py-1 rounded-full uppercase">Optimized for Illustrator</span>
            </div>
            
            <img id="outputImage" class="w-full h-auto border-2 border-slate-100 shadow-2xl mb-12 rounded-sm grayscale hover:grayscale-0 transition-all duration-700">

            <a id="downloadPng" class="w-full flex items-center justify-center bg-black text-white py-6 font-black text-xs tracking-[0.4em] hover:bg-slate-800 transition-all cursor-pointer uppercase shadow-2xl rounded-xl">
                Download Master PNG
            </a>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput'), styleText = document.getElementById('styleInput'), btn = document.getElementById('generateBtn');
        const fileNameDisp = document.getElementById('fileName'), outputImg = document.getElementById('outputImage'), resultContainer = document.getElementById('resultContainer');

        let origW = 0, origH = 0;

        input.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image(); img.src = re.target.result;
                img.onload = () => {
                    origW = img.naturalWidth; origH = img.naturalHeight;
                    fileNameDisp.innerText = file.name.toUpperCase();
                    btn.disabled = false; btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                    btn.classList.add('bg-black', 'text-white', 'cursor-pointer');
                };
            };
            reader.readAsDataURL(file);
        };

        btn.onclick = async () => {
            // Immediate "Thinking" state
            const originalBtnText = btn.innerText;
            btn.innerText = "THINKING...";
            btn.classList.add('btn-thinking');
            btn.disabled = true;

            try {
                const reader = new FileReader();
                reader.readAsDataURL(input.files[0]);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const response = await fetch('/.netlify/functions/generate-diagram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            imageBase64: base64, 
                            mimeType: input.files[0].type, 
                            customInstructions: styleText.value, 
                            width: origW, 
                            height: origH 
                        })
                    });

                    if (!response.ok) throw new Error("Processing Timeout - The site area may be too complex.");
                    const data = await response.json();
                    
                    outputImg.src = `data:image/png;base64,${data.image}`;
                    const pngLink = document.getElementById('downloadPng');
                    pngLink.href = `data:image/png;base64,${data.image}`;
                    pngLink.download = `HannahTerry_SitePlan.png`;

                    resultContainer.classList.remove('hidden');
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                    
                    // Reset Button
                    btn.innerText = originalBtnText;
                    btn.classList.remove('btn-thinking');
                    btn.disabled = false;
                };
            } catch (err) {
                btn.innerText = "Generate Site Diagram";
                btn.classList.remove('btn-thinking');
                btn.disabled = false;
                alert("ENGINE NOTICE: " + err.message);
            }
        };
    </script>
</body>
</html>
