<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hannah Terry Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-6 md:p-12">
    <div class="max-w-3xl mx-auto">
        <header class="border-b-4 border-black pb-6 mb-12">
            <h1 class="text-4xl font-black tracking-tighter uppercase">Site Diagrammer <span class="text-slate-400 text-xl font-normal ml-2">v3.2</span></h1>
            <p class="text-xs font-bold text-slate-500 tracking-[0.2em] mt-2 uppercase">Nashville Architecture AI Pipeline</p>
        </header>

        <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm mb-6 text-center">
            <div class="border-2 border-dashed border-slate-300 rounded-lg py-10 px-4 hover:border-black transition-all">
                <input type="file" id="imageInput" class="hidden" accept="image/*">
                <label for="imageInput" class="cursor-pointer">
                    <div class="bg-black text-white px-8 py-3 font-bold text-sm tracking-widest uppercase mb-4 inline-block">Select Aerial Photo</div>
                    <p id="fileName" class="text-slate-400 text-xs font-bold uppercase tracking-widest">No file selected</p>
                    <p id="fileDim" class="text-slate-300 text-[10px] mt-1 font-black uppercase"></p>
                </label>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 text-center">Custom Style Instructions</label>
            <textarea id="styleInput" class="w-full h-24 p-4 border border-slate-200 rounded-lg text-sm font-medium focus:border-black outline-none" placeholder="Leave blank for firm standard..."></textarea>
        </div>

        <button id="generateBtn" class="w-full py-5 rounded-lg font-black text-lg tracking-widest transition-all opacity-50 bg-slate-200 text-slate-400 cursor-not-allowed" disabled>
            GENERATE DIAGRAM
        </button>

        <div id="resultContainer" class="mt-16 hidden">
            <div class="flex items-center justify-between mb-6 border-b border-slate-200 pb-4">
                <h2 class="text-xs font-black uppercase tracking-[0.3em]">Architectural Output</h2>
                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded">VECTOR READY</span>
            </div>
            <img id="outputImage" class="w-full shadow-2xl border border-slate-100 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a id="downloadPng" class="flex items-center justify-center bg-white border-2 border-black text-black py-4 font-bold text-xs tracking-widest hover:bg-slate-50 cursor-pointer uppercase">Download PNG</a>
                <a id="downloadSvg" class="flex items-center justify-center bg-black text-white py-4 font-bold text-xs tracking-widest hover:bg-slate-800 cursor-pointer uppercase">Download SVG</a>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const styleText = document.getElementById('styleInput');
        const btn = document.getElementById('generateBtn');
        const fileNameDisp = document.getElementById('fileName');
        const fileDimDisp = document.getElementById('fileDim');
        const outputImg = document.getElementById('outputImage');
        const resultContainer = document.getElementById('resultContainer');

        let origW = 0, origH = 0;

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image();
                img.src = re.target.result;
                img.onload = () => {
                    origW = img.naturalWidth;
                    origH = img.naturalHeight;
                    fileNameDisp.innerText = file.name.toUpperCase();
                    fileNameDisp.classList.replace('text-slate-400', 'text-black');
                    fileDimDisp.innerText = `${origW}PX X ${origH}PX`;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                    btn.classList.add('bg-black', 'text-white', 'cursor-pointer');
                };
            };
            reader.readAsDataURL(file);
        };

        btn.onclick = async () => {
            btn.innerText = "VECTORIZING SITE...";
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const reader = new FileReader();
                reader.readAsDataURL(input.files[0]);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const res = await fetch('/.netlify/functions/generate-diagram', {
                        method: 'POST',
                        body: JSON.stringify({ 
                            imageBase64: base64, 
                            mimeType: input.files[0].type,
                            customInstructions: styleText.value,
                            width: origW, height: origH 
                        })
                    });

                    const data = await res.json();
                    if (data.error) throw new Error(data.error);

                    outputImg.src = `data:image/png;base64,${data.image}`;
                    document.getElementById('downloadPng').href = `data:image/png;base64,${data.image}`;
                    document.getElementById('downloadPng').download = "SitePlan.png";
                    document.getElementById('downloadSvg').href = `data:image/svg+xml;base64,${data.svg}`;
                    document.getElementById('downloadSvg').download = "SiteVector.svg";

                    resultContainer.classList.remove('hidden');
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                };
            } catch (err) {
                alert("ENGINE NOTICE: " + err.message);
            } finally {
                btn.innerText = "GENERATE DIAGRAM";
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
